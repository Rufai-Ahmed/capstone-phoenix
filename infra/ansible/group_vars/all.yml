---
# Connection — the key you created for Terraform (var.ssh_public_key_path's private half).
ansible_user: ubuntu
ansible_ssh_private_key_file: "~/.ssh/capstone-phoenix"
ansible_python_interpreter: /usr/bin/python3

# Pin k3s so a rebuild is reproducible (the cluster's "no :latest"). Check
# https://github.com/k3s-io/k3s/releases and bump deliberately.
k3s_version: "v1.30.5+k3s1"

# Must match infra/terraform var.vpc_cidr — scopes the optional host firewall.
cluster_vpc_cidr: "10.20.0.0/16"

# Where the rewritten kubeconfig lands on YOUR machine (gitignored by *kubeconfig*).
kubeconfig_local_path: "{{ playbook_dir }}/kubeconfig"
