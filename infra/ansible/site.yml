---
# Bare Ubuntu VMs -> a running k3s cluster, idempotently.
#   ansible-playbook site.yml
# A second run reports changed=0.

- name: Harden every node
  hosts: k3s_cluster
  become: true
  roles:
    - hardening

- name: Install the k3s control plane
  hosts: server
  become: true
  roles:
    - k3s_server

- name: Join the k3s agents
  hosts: agents
  become: true
  roles:
    - k3s_agent
