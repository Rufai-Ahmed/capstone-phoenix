apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3 # verify a current version before deploying
    helm:
      values: |
        controller:
          # DaemonSet + hostPort: every node listens on :80/:443, so DNS can point
          # at any node and a worker drain never takes ingress down. No cloud LB.
          kind: DaemonSet
          hostPort:
            enabled: true
          service:
            type: ClusterIP
          publishService:
            enabled: false
          watchIngressWithoutClass: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
