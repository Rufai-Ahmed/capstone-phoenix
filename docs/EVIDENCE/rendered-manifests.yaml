  namespace: taskapp
spec:
  clusterIP: None
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: backend
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: backend
  namespace: taskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - command:
        - gunicorn
        - --workers
        - "3"
        - --bind
        - 0.0.0.0:5000
        - --access-logfile
        - '-'
        - run:app
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DATABASE_PASSWORD
              name: taskapp-secret
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: SECRET_KEY
              name: taskapp-secret
        envFrom:
        - configMapRef:
            name: taskapp-config
        image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - sleep 10
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 15
          tcpSocket:
            port: 5000
          timeoutSeconds: 3
        name: backend
        ports:
        - containerPort: 5000
          name: http
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /api/health
            port: 5000
          periodSeconds: 5
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      terminationGracePeriodSeconds: 45
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: backend
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
      volumes:
      - emptyDir: {}
        name: tmp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: frontend
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: frontend
  namespace: taskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - image: ghcr.io/ts-a-devops/taskapp-frontend:69432e1
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - sleep 5; nginx -s quit
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 15
          timeoutSeconds: 3
        name: frontend
        ports:
        - containerPort: 80
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            - CHOWN
            - SETGID
            - SETUID
            - DAC_OVERRIDE
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        startupProbe:
          failureThreshold: 20
          httpGet:
            path: /healthz
            port: 80
          periodSeconds: 3
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: frontend
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: postgres
  namespace: taskapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  serviceName: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              key: POSTGRES_DB
              name: taskapp-config
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              key: POSTGRES_USER
              name: taskapp-config
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DATABASE_PASSWORD
              name: taskapp-secret
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16-alpine
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - taskapp_user
            - -d
            - taskapp
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
        name: postgres
        ports:
        - containerPort: 5432
          name: postgres
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - taskapp_user
            - -d
            - taskapp
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: data
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 70
        runAsUser: 70
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: local-path
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: backend
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: frontend
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: backend
  namespace: taskapp
spec:
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
  maxReplicas: 6
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  minReplicas: 2
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
---
apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: taskapp-migrate
  namespace: taskapp
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: taskapp-migrate
    spec:
      containers:
      - command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: DATABASE_PASSWORD
              name: taskapp-secret
        envFrom:
        - configMapRef:
            name: taskapp-config
        image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
        name: migrate
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10001
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      initContainers:
      - command:
        - sh
        - -c
        - until pg_isready -h postgres -p 5432 -U taskapp_user; do sleep 2; done
        image: postgres:16-alpine
        name: wait-for-db
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 70
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      volumes:
      - emptyDir: {}
        name: tmp
  ttlSecondsAfterFinished: 600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
  name: taskapp
  namespace: taskapp
spec:
  ingressClassName: nginx
  rules:
  - host: taskapp.rufaiahmed.com
    http:
      paths:
      - backend:
          service:
            name: frontend
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - taskapp.rufaiahmed.com
    secretName: taskapp-tls
---
