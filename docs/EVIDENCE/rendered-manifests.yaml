apiVersion: v1
kind: Service
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  labels:
    app: postgres
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: taskapp
