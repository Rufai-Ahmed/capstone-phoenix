# Migrations run once here, not in the replicas (they'd race). Wave 2 = after
# Postgres (0), before backend (3). Replace=true re-runs it on a backend image bump.
apiVersion: batch/v1
kind: Job
metadata:
  name: taskapp-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: taskapp-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine
          command:
            ["sh", "-c", "until pg_isready -h postgres -p 5432 -U taskapp_user; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 70
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: taskapp-config
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskapp-secret
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
