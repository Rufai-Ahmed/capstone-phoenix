# TEMPLATE — shows the keys the app needs. NOT referenced by kustomization.yaml.
# Choose ONE way to get this Secret into the cluster (details: docs/RUNBOOK.md):
#
#   A) Out-of-band (simplest first run) — create it once, let Argo ignore it:
#        kubectl -n taskapp create secret generic taskapp-secret \
#          --from-literal=DATABASE_PASSWORD="$(openssl rand -base64 24)" \
#          --from-literal=SECRET_KEY="$(python3 -c 'import secrets;print(secrets.token_hex(32))')"
#
#   B) Git-native (recommended end state) — seal it so the ENCRYPTED form lives
#      in git and Argo owns it end-to-end:
#        ./scripts/seal-secret.sh           # writes manifests/base/taskapp.sealed.yaml
#      then uncomment the taskapp.sealed.yaml line in manifests/base/kustomization.yaml
#
# Keys:
#   DATABASE_PASSWORD — Postgres password AND the backend's DATABASE_PASSWORD (same value)
#   SECRET_KEY        — Flask SECRET_KEY used to sign JWTs
apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secret
  namespace: taskapp
type: Opaque
stringData:
  DATABASE_PASSWORD: "REPLACE_with_a_strong_password"
  SECRET_KEY: "REPLACE_with_64_hex_chars"
