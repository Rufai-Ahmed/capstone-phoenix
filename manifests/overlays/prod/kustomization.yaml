apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

# Deployed image tags (pinned GHCR SHAs, never :latest). Bump on release with
# `kustomize edit set image`.
images:
  - name: ghcr.io/ts-a-devops/taskapp-backend
    newTag: "5d6b8fc"
  - name: ghcr.io/ts-a-devops/taskapp-frontend
    newTag: "69432e1" # quoted so YAML doesn't read it as a number

patches:
  # Point the Ingress + its TLS cert at your domain.
  - target:
      kind: Ingress
      name: taskapp
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: taskapp.rufaiahmed.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: taskapp.rufaiahmed.com
  # Keep the API's CORS allowlist aligned with the domain.
  - target:
      kind: ConfigMap
      name: taskapp-config
    patch: |-
      - op: replace
        path: /data/CORS_ORIGINS
        value: https://taskapp.rufaiahmed.com
